<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed Neji | Technical Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    background-color: #0d0d0d;
    color: #e6e6e6;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    border-bottom: 1px solid #1a1a1a;
}

.nav-left button,
.nav-right button {
    background: none;
    border: none;
    color: #e6e6e6;
    margin-right: 20px;
    font-size: 1rem;
    cursor: pointer;
}

.nav-left button:hover,
.nav-right button:hover {
    color: #888;
}

section {
    max-width: 900px;
    margin: 80px auto;
    padding: 0 20px;
    display: none;
}

section.active {
    display: block;
}

h1 {
    font-weight: 400;
    margin-bottom: 30px;
}

.project {
    margin-bottom: 50px;
}

.project img {
    width: 100%;
    margin-top: 20px;
    border-radius: 8px;
    opacity: 0.9;
}

.project img:hover {
    opacity: 1;
    transition: 0.3s;
}

footer {
    text-align: center;
    padding: 40px;
    border-top: 1px solid #1a1a1a;
    color: #666;
    margin-top: 80px;
}
</style>
</head>

<body>

<nav>
    <div class="nav-left">
        <button onclick="showSection('overview')">Overview</button>
        <button onclick="showSection('career')">Career</button>
        <button onclick="showSection('projects')">Projects</button>
    </div>

    <div class="nav-right">
        <button onclick="setLanguage('en')">EN</button>
        <button onclick="setLanguage('de')">DE</button>
    </div>
</nav>

<section id="overview" class="active">
    <h1 data-en="Overview" data-de="Übersicht">Overview</h1>
    <p data-en="Technical portfolio focused on mechanical and industrial systems."
       data-de="Technisches Portfolio mit Fokus auf mechanische und industrielle Systeme.">
       Technical portfolio focused on mechanical and industrial systems.
    </p>
</section>

<section id="career">
    <h1 data-en="Career" data-de="Werdegang">Career</h1>
    <p data-en="Information about professional development and technical growth."
       data-de="Informationen über berufliche Entwicklung und technisches Wachstum.">
       Information about professional development and technical growth.
    </p>
</section>

<section id="projects">
    <h1 data-en="Projects" data-de="Projekte">Projects</h1>

    <div class="project">
        <h3 data-en="Project Title" data-de="Projekttitel">Project Title</h3>
        <p data-en="Description of technical implementation and applied principles."
           data-de="Beschreibung der technischen Umsetzung und angewandter Prinzipien.">
           Description of technical implementation and applied principles.
        </p>
        <img src="project1.jpg" alt="Project image">
    </div>
</section>

<footer>
    © 2026 Ahmed Neji
</footer>

<script>
function showSection(id) {
    document.querySelectorAll("section").forEach(section => {
        section.classList.remove("active");
    });
    document.getElementById(id).classList.add("active");
}

function setLanguage(lang) {
    document.querySelectorAll("[data-en]").forEach(element => {
        element.textContent = element.getAttribute("data-" + lang);
    });
}
</script>

</body>
</html>
